<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫有協思寶庫 ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --c-bg:        #fdf6ff;
  --c-bg2:       #f3e8ff;
  --c-purple:    #a855f7;
  --c-purple-d:  #7e22ce;
  --c-purple-l:  #e9d5ff;
  --c-pink:      #ec4899;
  --c-blue:      #3b82f6;
  --c-teal:      #14b8a6;
  --c-yellow:    #f59e0b;
  --c-green:     #10b981;
  --c-text:      #1e1b4b;
  --c-muted:     #7c6f9e;
  --c-border:    #e5d5fa;
  --c-card:      #ffffff;
  --radius-lg:   20px;
  --radius-pill: 100px;
  --shadow-sm:   0 2px 10px rgba(168,85,247,.10);
  --shadow-md:   0 6px 28px rgba(168,85,247,.18);
  --shadow-lg:   0 16px 48px rgba(168,85,247,.22);
  --font-display: 'Nunito', 'Noto Sans TC', sans-serif;
  --font-body:    'Noto Sans TC', sans-serif;
}

/* ══════════════════════════════════════
   RESET + BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════
   ANIMATED BG BLOBS
══════════════════════════════════════ */
.bg-blobs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(72px);
  opacity: .35;
  animation: blobFloat 8s ease-in-out infinite;
}
.blob-1 { width:420px; height:420px; background:#c084fc; top:-100px; left:-80px; animation-delay:0s; }
.blob-2 { width:320px; height:320px; background:#f9a8d4; top:40%; right:-60px; animation-delay:-3s; }
.blob-3 { width:260px; height:260px; background:#93c5fd; bottom:10%; left:20%; animation-delay:-5s; }
.blob-4 { width:200px; height:200px; background:#6ee7b7; bottom:-60px; right:30%; animation-delay:-2s; }
@keyframes blobFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-30px) scale(1.05); }
}

/* ══════════════════════════════════════
   LAYOUT WRAPPER
══════════════════════════════════════ */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(253,246,255,.82);
  border-bottom: 1.5px solid var(--c-border);
  padding: 0 24px;
}
.navbar-inner {
  max-width: 1160px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.navbar-logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.15rem;
  color: var(--c-purple-d);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.3px;
}
.navbar-logo .logo-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-purple), var(--c-pink));
  display: inline-block;
}
.navbar-link {
  font-size: 0.82rem;
  color: var(--c-muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--c-border);
  background: white;
  font-weight: 600;
  transition: all .2s;
}
.navbar-link:hover {
  border-color: var(--c-purple);
  color: var(--c-purple);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero {
  text-align: center;
  padding: 72px 24px 52px;
  animation: fadeUp .7s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--c-purple-l);
  color: var(--c-purple-d);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  margin-bottom: 18px;
  letter-spacing: .3px;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 900;
  line-height: 1.2;
  letter-spacing: -1px;
  margin-bottom: 16px;
}
.hero h1 .grad {
  background: linear-gradient(135deg, var(--c-purple) 0%, var(--c-pink) 50%, var(--c-yellow) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  font-size: 1rem;
  color: var(--c-muted);
  max-width: 480px;
  margin: 0 auto 32px;
  line-height: 1.7;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.stat-chip {
  background: white;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius-pill);
  padding: 6px 16px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--c-purple-d);
  box-shadow: var(--shadow-sm);
}
.stat-chip span { color: var(--c-purple); }

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
.search-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 0;
  animation: fadeUp .7s .15s ease both;
}
.search-box {
  position: relative;
  width: 100%;
  max-width: 520px;
}
.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--c-muted);
  pointer-events: none;
  width: 18px; height: 18px;
}
.search-box input {
  width: 100%;
  padding: 15px 20px 15px 50px;
  border-radius: var(--radius-pill);
  border: 2px solid var(--c-border);
  background: white;
  font-size: 0.95rem;
  font-family: var(--font-body);
  outline: none;
  box-shadow: var(--shadow-md);
  transition: border-color .2s, box-shadow .2s;
  color: var(--c-text);
}
.search-box input::placeholder { color: #b8a8d0; }
.search-box input:focus {
  border-color: var(--c-purple);
  box-shadow: 0 0 0 4px rgba(168,85,247,.12), var(--shadow-md);
}

/* ══════════════════════════════════════
   CATEGORY SECTION
══════════════════════════════════════ */
.cat-section {
  padding: 32px 0 0;
  animation: fadeUp .7s .25s ease both;
}
.cat-label {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--c-muted);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}
.cat-pill {
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  border: 2px solid var(--c-border);
  background: white;
  font-size: 0.83rem;
  font-family: var(--font-body);
  font-weight: 700;
  cursor: pointer;
  transition: all .18s;
  color: var(--c-muted);
  box-shadow: var(--shadow-sm);
}
.cat-pill:hover {
  border-color: var(--c-purple);
  color: var(--c-purple);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.cat-pill.active {
  background: linear-gradient(135deg, var(--c-purple), var(--c-pink));
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 16px rgba(168,85,247,.4);
  transform: translateY(-2px);
}

/* ══════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════ */
.content-section {
  padding: 36px 0 80px;
}
.result-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  flex-wrap: wrap;
  gap: 10px;
}
.result-count {
  font-size: 0.82rem;
  color: var(--c-muted);
  font-weight: 600;
}
.result-count strong { color: var(--c-purple); }

/* ══════════════════════════════════════
   SECTION HEADING
══════════════════════════════════════ */
.section-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  margin-top: 8px;
}
.section-heading-emoji {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.section-heading-text {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--c-text);
}
.section-heading-line {
  flex: 1;
  height: 2px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--c-border), transparent);
}

/* ══════════════════════════════════════
   CARD GRID
══════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
  gap: 18px;
  margin-bottom: 44px;
}

/* ══════════════════════════════════════
   CARD
══════════════════════════════════════ */
.card {
  background: var(--c-card);
  border-radius: var(--radius-lg);
  padding: 22px 22px 18px;
  border: 2px solid var(--c-border);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s, border-color .22s;
  position: relative;
  overflow: hidden;
  animation: cardIn .4s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(168,85,247,.06), rgba(236,72,153,.04));
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}
.card:hover {
  transform: translateY(-5px) scale(1.015);
  box-shadow: var(--shadow-lg);
  border-color: var(--c-purple-l);
}
.card:hover::after { opacity: 1; }

/* top accent strip */
.card-strip {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 11px;
  border-radius: var(--radius-pill);
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: .2px;
}
.card-step {
  font-size: 0.68rem;
  font-weight: 700;
  color: #c4b5fd;
  background: #faf5ff;
  border: 1.5px solid #e9d5ff;
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  white-space: nowrap;
}
.card-title {
  font-family: var(--font-display);
  font-size: 1.07rem;
  font-weight: 900;
  line-height: 1.3;
  color: var(--c-text);
}
.card-body {
  font-size: 0.8rem;
  color: var(--c-muted);
  line-height: 1.72;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
  white-space: pre-wrap;
}
.copy-btn {
  margin-top: 6px;
  width: 100%;
  padding: 11px 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--c-purple), var(--c-pink));
  color: white;
  font-size: 0.86rem;
  font-weight: 800;
  font-family: var(--font-body);
  cursor: pointer;
  transition: opacity .2s, transform .12s, box-shadow .2s;
  box-shadow: 0 3px 12px rgba(168,85,247,.35);
  letter-spacing: .2px;
}
.copy-btn:hover {
  opacity: .9;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(168,85,247,.45);
}
.copy-btn:active { transform: scale(.97); }
.copy-btn.copied {
  background: linear-gradient(135deg, #10b981, #14b8a6);
  box-shadow: 0 3px 12px rgba(16,185,129,.35);
}

/* ══════════════════════════════════════
   TAG COLOR MAP
══════════════════════════════════════ */
.tag-內容創作 { background:#fce7f3; color:#be185d; }
.tag-程式應用 { background:#d1fae5; color:#065f46; }
.tag-程式生成 { background:#dcfce7; color:#15803d; }
.tag-簡報表達 { background:#dbeafe; color:#1d4ed8; }
.tag-文本優化 { background:#ffedd5; color:#c2410c; }
.tag-生文校正 { background:#fef9c3; color:#854d0e; }
.tag-筆記精煉 { background:#ede9fe; color:#6d28d9; }
.tag-筆記整理 { background:#f5f3ff; color:#5b21b6; }
.tag-資訊整理 { background:#e0f2fe; color:#0369a1; }
.tag-圖片生成 { background:#fdf4ff; color:#7e22ce; }
.tag-心智圖法 { background:#f0fdf4; color:#166534; }
.tag-專案企劃 { background:#fefce8; color:#713f12; }

/* ══════════════════════════════════════
   TYPE STRIP COLORS
══════════════════════════════════════ */
.strip-協思 { background: linear-gradient(90deg, #a855f7, #ec4899); }
.strip-協做 { background: linear-gradient(90deg, #10b981, #3b82f6); }
.strip-助理 { background: linear-gradient(90deg, #f59e0b, #ef4444); }

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty {
  text-align: center;
  padding: 72px 20px;
  color: var(--c-muted);
}
.empty-emoji { font-size: 3rem; margin-bottom: 12px; }
.empty p { font-size: 0.95rem; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,10,60,.55);
  backdrop-filter: blur(6px);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 24px;
  max-width: 600px;
  width: 100%;
  max-height: 86vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: 0 32px 80px rgba(168,85,247,.3);
  animation: modalPop .22s cubic-bezier(.34,1.56,.64,1);
  border: 2px solid var(--c-border);
}
@keyframes modalPop { from { transform:scale(.88); opacity:0; } }
.modal-strip {
  height: 5px;
  border-radius: 10px;
  margin-bottom: 22px;
}
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:12px; }
.modal-title { font-family:var(--font-display); font-size:1.3rem; font-weight:900; line-height:1.3; }
.modal-close {
  background: #f3e8ff;
  border: none;
  cursor: pointer;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: var(--c-purple);
  flex-shrink: 0;
  transition: background .18s, transform .18s;
}
.modal-close:hover { background: var(--c-purple-l); transform: rotate(90deg); }
.modal-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.modal-type-badge {
  display:inline-block;
  padding:4px 12px;
  border-radius:var(--radius-pill);
  font-size:0.72rem;
  font-weight:800;
  background:#f5f3ff;
  color:#6d28d9;
  border: 1.5px solid #e9d5ff;
}
.modal-content-box {
  font-size:0.87rem;
  line-height:1.82;
  color:#374151;
  white-space:pre-wrap;
  border: 2px solid var(--c-border);
  border-radius: 14px;
  padding: 18px;
  background: #fdf6ff;
  max-height: 360px;
  overflow-y: auto;
}
.modal-content-box::-webkit-scrollbar { width: 6px; }
.modal-content-box::-webkit-scrollbar-thumb { background: var(--c-purple-l); border-radius: 3px; }
.modal-copy-btn {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--c-purple), var(--c-pink));
  color: white;
  font-size: 0.97rem;
  font-weight: 800;
  font-family: var(--font-body);
  cursor: pointer;
  transition: opacity .2s, transform .12s;
  box-shadow: 0 4px 18px rgba(168,85,247,.4);
  letter-spacing: .3px;
}
.modal-copy-btn:hover { opacity:.88; transform:translateY(-1px); }
.modal-copy-btn.copied {
  background: linear-gradient(135deg, #10b981, #14b8a6);
  box-shadow: 0 4px 18px rgba(16,185,129,.4);
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.footer {
  border-top: 2px solid var(--c-border);
  padding: 28px 24px;
  text-align: center;
  font-size: 0.8rem;
  color: var(--c-muted);
  background: white;
}
.footer a { color: var(--c-purple); text-decoration: none; font-weight: 700; }
.footer a:hover { text-decoration: underline; }

/* ══════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════ */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--c-bg); }
::-webkit-scrollbar-thumb { background: var(--c-purple-l); border-radius: 4px; }

/* ══════════════════════════════════════
   LOADING
══════════════════════════════════════ */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--c-muted);
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--c-border);
  border-top-color: var(--c-purple);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 600px) {
  .hero h1 { font-size: 1.9rem; }
  .card-grid { grid-template-columns: 1fr; }
  .modal { padding: 22px; }
}
</style>
</head>
<body>

<!-- BG Blobs -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="#" class="navbar-logo">
      <span class="logo-dot"></span>
      紫有協思寶庫
    </a>
    <a class="navbar-link" href="https://docs.google.com/spreadsheets/d/13TpPIRN_Fk2Zt1LofU2ePdOP202BLSzFHpppMfW8mNs/edit?usp=sharing" target="_blank">
      📊 原始資料
    </a>
  </div>
</nav>

<!-- Hero -->
<div class="wrapper">
  <div class="hero">
    <div class="hero-badge">✨ AI Prompt 精選集</div>
    <h1>紫有<span class="grad">協思寶庫</span></h1>
    <p>精選 AI 提示詞，讓你的工作更聰明、更有效率。點一下即可複製使用！</p>
    <div class="hero-stats" id="heroStats">
      <div class="stat-chip">📦 載入中…</div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜尋提示詞、分類…">
      </div>
    </div>
  </div>

  <!-- Categories -->
  <div class="cat-section">
    <div class="cat-label">依分類瀏覽</div>
    <div class="categories" id="categories"></div>
  </div>

  <!-- Content -->
  <div class="content-section">
    <div class="result-meta">
      <div class="result-count" id="resultCount"></div>
    </div>
    <div id="container">
      <div class="loading"><div class="spinner"></div>載入資料中…</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-strip" id="modalStrip"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose" aria-label="關閉">✕</button>
    </div>
    <div class="modal-meta">
      <span class="card-tag" id="modalCat"></span>
      <span class="modal-type-badge" id="modalType"></span>
    </div>
    <div class="modal-content-box" id="modalContent"></div>
    <button class="modal-copy-btn" id="modalCopyBtn">📋 複製 Prompt</button>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <p>紫有協思寶庫 · 資料來源 <a href="https://docs.google.com/spreadsheets/d/13TpPIRN_Fk2Zt1LofU2ePdOP202BLSzFHpppMfW8mNs/edit?usp=sharing" target="_blank">Google Sheet</a> · Made with 💜</p>
</footer>

<script>
/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
const SHEET_ID = '13TpPIRN_Fk2Zt1LofU2ePdOP202BLSzFHpppMfW8mNs';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

const TYPE_META = {
  'AI 協思': { emoji:'🧠', strip:'strip-協思' },
  'AI 協做': { emoji:'🛠️', strip:'strip-協做' },
  'AI 助理': { emoji:'🤖', strip:'strip-助理' },
};

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let ALL  = [];
let currentCat    = '全部';
let currentSearch = '';
let modalData     = null;

/* ══════════════════════════════════
   CSV PARSER
══════════════════════════════════ */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch !== '\r') field += ch;
    }
  }
  if (row.length || field) { row.push(field); rows.push(row); }
  return rows;
}

/* ══════════════════════════════════
   LOAD DATA
══════════════════════════════════ */
async function loadData() {
  try {
    const res  = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('資料為空');

    const h = rows[0].map(s => s.trim());
    const col = name => h.findIndex(v => v.toLowerCase().includes(name.toLowerCase()));
    const typeCol  = col('Type')  !== -1 ? col('Type')  : 0;
    const catCol   = col('Category') !== -1 ? col('Category') : col('分類') !== -1 ? col('分類') : 1;
    const titleCol = col('Title') !== -1 ? col('Title') : col('標題') !== -1 ? col('標題') : 2;
    const stepCol  = col('流程');
    const bodyCol  = col('Content') !== -1 ? col('Content') : col('內容') !== -1 ? col('內容') : 3;

    ALL = rows.slice(1)
      .filter(r => r.length > Math.max(typeCol, catCol, titleCol, bodyCol))
      .map(r => ({
        type:     (r[typeCol]  || '').trim(),
        category: (r[catCol]   || '').trim(),
        title:    (r[titleCol] || '').trim(),
        step:     stepCol !== -1 ? (r[stepCol] || '').trim() : '',
        content:  (r[bodyCol]  || '').trim(),
      }))
      .filter(d => d.title || d.content);

    buildStats();
    buildCategories();
    render();
  } catch (e) {
    document.getElementById('container').innerHTML =
      `<div class="empty"><div class="empty-emoji">⚠️</div><p>無法載入資料，請確認 Google Sheet 已設為「任何知道連結的人可以查看」。<br><small style="opacity:.7">${e.message}</small></p></div>`;
    document.getElementById('heroStats').innerHTML = `<div class="stat-chip">⚠️ 載入失敗</div>`;
  }
}

/* ══════════════════════════════════
   STATS CHIPS
══════════════════════════════════ */
function buildStats() {
  const cats  = new Set(ALL.map(d => d.category)).size;
  const types = new Set(ALL.map(d => d.type)).size;
  document.getElementById('heroStats').innerHTML = `
    <div class="stat-chip">📦 <span>${ALL.length}</span> 個 Prompt</div>
    <div class="stat-chip">🏷️ <span>${cats}</span> 個分類</div>
    <div class="stat-chip">✨ <span>${types}</span> 種類型</div>
  `;
}

/* ══════════════════════════════════
   CATEGORIES
══════════════════════════════════ */
function buildCategories() {
  const cats = ['全部', ...new Set(ALL.map(d => d.category).filter(Boolean))];
  const wrap = document.getElementById('categories');
  wrap.innerHTML = cats.map(c =>
    `<button class="cat-pill${c === currentCat ? ' active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  wrap.querySelectorAll('.cat-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      wrap.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

/* ══════════════════════════════════
   FILTER
══════════════════════════════════ */
function filtered() {
  const q = currentSearch.toLowerCase();
  return ALL.filter(d => {
    const matchCat = currentCat === '全部' || d.category === currentCat;
    const matchQ   = !q || [d.title, d.content, d.category, d.type].some(v => v.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function render() {
  const items = filtered();
  const countEl = document.getElementById('resultCount');
  countEl.innerHTML = `共 <strong>${items.length}</strong> 個提示詞`;

  const container = document.getElementById('container');
  if (!items.length) {
    container.innerHTML = `<div class="empty"><div class="empty-emoji">🔍</div><p>找不到符合「${esc(currentSearch || currentCat)}」的提示詞</p></div>`;
    return;
  }

  // Group by type
  const groups = {};
  items.forEach((d, i) => {
    if (!groups[d.type]) groups[d.type] = [];
    groups[d.type].push({ ...d, _i: i });
  });

  let html = '';
  for (const [type, group] of Object.entries(groups)) {
    const meta  = TYPE_META[type] || { emoji:'✨', strip:'strip-協思' };
    const short = type.replace('AI ', '');
    html += `
      <div class="section-heading">
        <div class="section-heading-emoji" style="background:${short==='協思'?'#f5f3ff':short==='協做'?'#ecfdf5':'#fffbeb'}">${meta.emoji}</div>
        <div class="section-heading-text">${type}</div>
        <div class="section-heading-line"></div>
      </div>
      <div class="card-grid" style="animation-delay:.05s">
        ${group.map(d => cardHTML(d, d._i)).join('')}
      </div>`;
  }

  container.innerHTML = html;

  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      copyText(items[+btn.dataset.i].content, btn);
    });
  });
  container.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(items[+card.dataset.i]));
  });
}

function cardHTML(d, i) {
  const short = (d.type || '').replace('AI ', '');
  const stripClass = `strip-${short}`;
  const stepBadge  = d.step ? `<span class="card-step">步驟 ${d.step}</span>` : '';
  return `
    <div class="card" data-i="${i}">
      <div class="card-strip ${stripClass}"></div>
      <div class="card-top">
        <span class="card-tag tag-${esc(d.category)}">${esc(d.category)}</span>
        ${stepBadge}
      </div>
      <div class="card-title">${esc(d.title)}</div>
      <div class="card-body">${esc(d.content)}</div>
      <button class="copy-btn" data-i="${i}">📋 複製 Prompt</button>
    </div>`;
}

/* ══════════════════════════════════
   COPY
══════════════════════════════════ */
async function copyText(text, btn) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const orig = btn.textContent;
  btn.textContent = '✅ 已複製！';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
function openModal(d) {
  modalData = d;
  const short = (d.type || '').replace('AI ', '');
  document.getElementById('modalStrip').className = `modal-strip strip-${short}`;
  document.getElementById('modalTitle').textContent   = d.title;
  const catEl = document.getElementById('modalCat');
  catEl.textContent = d.category;
  catEl.className   = `card-tag tag-${d.category}`;
  document.getElementById('modalType').textContent    = d.type;
  document.getElementById('modalContent').textContent = d.content;
  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = '📋 複製 Prompt';
  btn.classList.remove('copied');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalCopyBtn').addEventListener('click', function() {
  copyText(modalData.content, this);
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════
   SEARCH
══════════════════════════════════ */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value;
    render();
  }, 220);
});

/* ══════════════════════════════════
   UTILS
══════════════════════════════════ */
function esc(s = '') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
loadData();
</script>
</body>
</html>
